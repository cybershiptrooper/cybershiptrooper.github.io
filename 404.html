<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>404 — Not found</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:           #F5F0E8;
    --ink:          #1A1915;
    --ink-soft:     #33322C;
    --muted:        #726E64;
    --muted-light:  #A39E92;
    --rule:         #D6CFC0;
    --accent:       #CC785C;
    --accent-deep:  #A75A3F;

    --serif-display: "Fraunces", "Source Serif 4", Georgia, serif;
    --serif-body:    "Source Serif 4", "Fraunces", Georgia, serif;
    --mono:          "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif-body);
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background-image:
      radial-gradient(ellipse 900px 500px at 75% -10%, rgba(204,120,92,0.07), transparent 60%),
      radial-gradient(ellipse 700px 600px at -10% 110%, rgba(167,90,63,0.05), transparent 60%);
    background-attachment: fixed;
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .lost {
    text-align: center;
    max-width: 480px;
    animation: rise 700ms cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin-bottom: 28px;
  }

  .four {
    font-family: var(--serif-display);
    font-optical-sizing: auto;
    font-variation-settings: "SOFT" 30, "opsz" 144;
    font-weight: 380;
    font-size: clamp(96px, 15vw, 156px);
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin: 0;
  }
  .four em {
    font-style: italic;
    font-variation-settings: "SOFT" 60, "opsz" 144;
    font-weight: 380;
    color: var(--accent-deep);
    margin: 0 0.02em;
  }

  .rule {
    border: none;
    width: 56px;
    height: 1px;
    background: var(--accent);
    margin: 28px auto 22px;
  }

  .lede {
    font-family: var(--serif-display);
    font-variation-settings: "SOFT" 40, "opsz" 30;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(19px, 2.6vw, 22px);
    line-height: 1.32;
    letter-spacing: -0.006em;
    color: var(--ink-soft);
    margin: 0 0 12px;
  }

  .sub {
    font-family: var(--serif-body);
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--muted);
    margin: 0 auto;
    max-width: 380px;
  }

  .ornament {
    margin-top: 36px;
    color: var(--accent);
    font-family: var(--serif-display);
    font-size: 20px;
  }

  @media (prefers-reduced-motion: reduce) {
    .lost { animation: none; }
  }
</style>
</head>

<body>

<main class="lost">
  <div class="kicker">Error · 404</div>
  <h1 class="four">4<em>0</em>4</h1>
  <hr class="rule" aria-hidden="true">
  <p class="lede">Nothing lives at this address.</p>
  <p class="sub">The page you were looking for has either moved, never existed, or was never meant for the open web.</p>
  <div class="ornament" aria-hidden="true">❧</div>
</main>

</body>
</html>
